<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Note Taker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d04a02'/><path d='M50 20a12 12 0 0 0-12 12v24a12 12 0 0 0 24 0V32a12 12 0 0 0-12-12z' fill='white'/><path d='M70 48v4a20 20 0 0 1-40 0v-4' stroke='white' stroke-width='5' fill='none' stroke-linecap='round'/><line x1='50' y1='72' x2='50' y2='82' stroke='white' stroke-width='5' stroke-linecap='round'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- ── Sidebar ────────────────────────────────────────── -->
    <aside class="sidebar">
      <a class="sidebar-logo" href="#/" onclick="navigate('/')">
        <span class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        </span>
        <span>AI Note Taker</span>
      </a>

      <nav>
        <a class="nav-link active" id="nav-meetings" href="#/" onclick="navigate('/')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
          Meetings
        </a>
        <a class="nav-link" id="nav-record" href="#/record" onclick="navigate('/record')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
          New Recording
        </a>
        <a class="nav-link" id="nav-podcast" href="javascript:void(0)" onclick="openPodcastModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 11.7C17 15 14.8 17.8 12 17.8s-5-2.8-5-6.1"/><circle cx="12" cy="7" r="4"/><path d="M12 17.8V22"/><path d="M7 22h10"/><path d="M2 10a10 10 0 0 0 20 0"/></svg>
          Generate Podcast
        </a>
        <a class="nav-link" id="nav-settings" href="#/settings" onclick="navigate('/settings')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          Settings
        </a>
      </nav>

      <div class="sidebar-bottom">
        <button class="btn-ask-ai" onclick="toggleChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
          Ask across meetings
        </button>
      </div>
    </aside>

    <!-- ── Main ───────────────────────────────────────────── -->
    <main class="main-content" id="app"></main>

  </div>

  <!-- ── Chat Panel ─────────────────────────────────────── -->
  <div class="chat-backdrop" id="chatBackdrop" onclick="toggleChat()"></div>
  <section class="chat-panel" id="chatPanel">
    <header class="chat-header">
      <div class="chat-header-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.287 1.288L3 12l5.8 1.9a2 2 0 0 1 1.288 1.287L12 21l1.9-5.8a2 2 0 0 1 1.287-1.288L21 12l-5.8-1.9a2 2 0 0 1-1.288-1.287Z"/></svg>
        <h2>Ask AI</h2>
      </div>
      <div class="chat-header-actions">
        <button class="btn-icon" onclick="startNewConversation()" title="New Chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
        <button class="btn-icon" onclick="toggleChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
    </header>
    <div class="chat-tabs">
      <button class="chat-tab active" data-tab="chat" onclick="switchChatTab('chat')">Chat</button>
      <button class="chat-tab" data-tab="history" onclick="switchChatTab('history')">Past Conversations</button>
    </div>
    <div class="chat-tab-content active" id="chatTabChat">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.287 1.288L3 12l5.8 1.9a2 2 0 0 1 1.288 1.287L12 21l1.9-5.8a2 2 0 0 1 1.287-1.288L21 12l-5.8-1.9a2 2 0 0 1-1.288-1.287Z"/></svg>
          <p>Ask a question about any of your meetings.</p>
        </div>
      </div>
      <footer class="chat-footer">
        <div class="qa-input-wrap">
          <input type="text" id="chatInput" placeholder="Ask about your meetings..." onkeydown="if(event.key==='Enter')sendChatMessage()" />
          <button class="btn-send" onclick="sendChatMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></svg>
          </button>
        </div>
      </footer>
    </div>
    <div class="chat-tab-content" id="chatTabHistory">
      <div class="chat-history-list" id="chatHistoryList"></div>
    </div>
  </section>

  <!-- Toast container -->
  <div id="toasts" style="position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>

  <script src="/static/app.js"></script>
</body>
</html>
